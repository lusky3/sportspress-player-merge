name: Plugin Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: wordpress/plugin-check-action@v1
        with:
          exclude-directories: '.github,.kiro,languages'
          exclude-files: '.oxlintrc.json,phpstan-bootstrap.php'
          ignore-warnings: 'true'
          categories: 'general,accessibility,performance,security'
          ignore-codes: 'WordPress.Security.EscapeOutput.OutputNotEscaped'
