name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  phpstan:
    name: PHPStan (Level 5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - name: Install WordPress stubs
        run: composer global require phpstan/phpstan szepeviktor/phpstan-wordpress php-stubs/wordpress-stubs --no-interaction
      - name: Run PHPStan
        run: ~/.composer/vendor/bin/phpstan analyse --configuration=phpstan.neon --no-progress

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
      - name: Run Semgrep
        run: semgrep scan --config p/php --config p/wordpress --error
