name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpstan:
    name: PHPStan (Level 5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: phpstan
      - name: Install WordPress stubs
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require php-stubs/wordpress-stubs szepeviktor/phpstan-wordpress --no-interaction
      - name: Run PHPStan
        run: phpstan analyse --configuration=phpstan.neon --no-progress
