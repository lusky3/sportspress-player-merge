name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  phpstan:
    name: PHPStan (Level 5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
      - name: Install WordPress stubs
        run: composer global require phpstan/phpstan szepeviktor/phpstan-wordpress php-stubs/wordpress-stubs --no-interaction
      - name: Run PHPStan
        run: ~/.composer/vendor/bin/phpstan analyse --configuration=phpstan.neon --no-progress

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
      - name: Run Semgrep
        run: semgrep scan --config p/php --config p/wordpress --error

  snyk:
    name: Snyk Code
    runs-on: ubuntu-latest
    if: vars.SNYK_TOKEN != ''
    steps:
      - uses: actions/checkout@v6
      - uses: snyk/actions/php@master
        with:
          command: code test
          args: --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    if: vars.SONAR_TOKEN != ''
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
